<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="styles/index_styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharks</title>
</head>

<body>
<h1>Sharks</h1>
<div class="Shark-card">
    
    <div class="item-shark-card">
        <h1 class="Shark-title">Basking Shark</h1>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Cetorhinus_maximus_by_greg_skomal.JPG/960px-Cetorhinus_maximus_by_greg_skomal.JPG" alt="Basking Shark">
        <p class="text-blurb"></p>
        <button class="card-button hover-item">></button>
    </div>

    <div class="item-shark-card">
        <h1 class="Shark-title">Lemon Shark</h1>
        <img src="Images/Lemon Shark/index-lemon-shark.jpg" alt="Lemon Shark">
        <p class="text-blurb"></p>
        <button class="card-button hover-item">></button>
    </div>

    <div class="item-shark-card">
        <h1 class="Shark-title">Great Hammerhead Shark</h1>
        <img src="Images/Great Hammerhead Shark/index-great-hammerhead-shark.jpg" alt="Great Hammerhead Shark">
        <p class="text-blurb"></p>
        <button class="card-button hover-item">></button>
    </div>

    <div class="item-shark-card">
        <h1 class="Shark-title">Whale Shark</h1>
        <img src="Images/Whale Shark/index-whale-shark.jpg" alt="Whale Shark">
        <p class="text-blurb"></p>
        <button class="card-button hover-item">></button>
    </div>

    <div class="item-shark-card">
        <h1 class="Shark-title">Oceanic Whitetip Shark</h1>
        <img src="Images/Oceanic Whitetip Shark/index-oceanic-whitetip-shark.jpg" alt="Oceanic Whitetip Shark">
        <p class="text-blurb"></p>
        <button class="card-button hover-item">></button>
    </div>

    <div class="item-shark-card">
        <h1 class="Shark-title">Great White Shark</h1>
        <img src="Images/Great White Shark/index-great-white-shark.jpg" alt="Great White Shark">
        <p class="text-blurb"></p>
        <button class="card-button hover-item">></button>
    </div>

</div>

</body>
</html>
